<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenRecall</title>

  <!-- Localized Assets -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/inter.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/material-symbols.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/m3-tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">

  <script type="module" src="{{ url_for('static', filename='js/material-web.js') }}"></script>

  <style>
    body {
      margin: 0;
      background-color: var(--md-sys-color-background);
      color: var(--md-sys-color-on-background);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Navigation Rail */
    .nav-rail {
      width: var(--nav-rail-width);
      background-color: var(--md-sys-color-surface-container-low);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      border-right: 1px solid var(--md-sys-color-outline-variant);
      z-index: 10;
    }

    .nav-item {
      width: 56px;
      height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: var(--md-sys-shape-corner-full);
      margin-bottom: 12px;
      color: var(--md-sys-color-on-surface-variant);
      text-decoration: none;
      transition: background-color 0.2s;
    }

    .nav-item.active {
      background-color: var(--md-sys-color-secondary-container);
      color: var(--md-sys-color-on-secondary-container);
    }

    .nav-item:hover:not(.active) {
      background-color: var(--md-sys-color-surface-container-high);
    }

    .nav-item span {
      font-size: 11px;
      margin-top: 4px;
    }

    /* Main Content Area */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--md-sys-color-background);
      overflow-y: auto;
    }

    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      background-color: var(--md-sys-color-background);
    }

    .search-container {
      flex: 1;
      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }

    .search-input {
      width: 100%;
      height: 56px;
      background-color: var(--md-sys-color-surface-container-highest);
      border: none;
      border-radius: var(--md-sys-shape-corner-extra-large);
      padding: 0 24px 0 56px;
      color: var(--md-sys-color-on-surface);
      font-size: 16px;
      outline: none;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 16px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .content-wrapper {
      padding: 24px;
      flex: 1;
    }

    .theme-toggle {
      position: absolute;
      bottom: 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <nav class="nav-rail">
    <a href="/search" class="nav-item {{ 'active' if request.path == '/search' or request.path == '/' }}">
      <span class="material-symbols-rounded">search</span>
      <span>Search</span>
    </a>
    <a href="/timeline" class="nav-item {{ 'active' if request.path == '/timeline' }}">
      <span class="material-symbols-rounded">timeline</span>
      <span>Timeline</span>
    </a>

    <div class="theme-toggle" onclick="toggleTheme()">
      <span class="material-symbols-rounded" id="theme-icon">light_mode</span>
    </div>
  </nav>

  <main>
    <header>
      <div class="search-container">
        <form action="/search" method="get">
          <span class="material-symbols-rounded search-icon">search</span>
          <input type="text" name="q" class="search-input" placeholder="Search your recall..." value="{{ request.args.get('q', '') }}">
        </form>
      </div>
    </header>

    <div class="content-wrapper">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('theme-icon');
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

      html.setAttribute('data-theme', newTheme);
      icon.textContent = newTheme === 'dark' ? 'light_mode' : 'dark_mode';
    }
  </script>
</body>
</html>
