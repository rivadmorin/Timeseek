{% extends "layout.html" %}
{% block content %}
<style>
    .timeline-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 120px);
        gap: 24px;
    }

    .viewer-card {
        flex: 1;
        background-color: var(--md-sys-color-surface-container-low);
        border-radius: var(--md-sys-shape-corner-extra-large);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border: 1px solid var(--md-sys-color-outline-variant);
    }

    .viewer-image {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    .control-panel {
        background-color: var(--md-sys-color-surface-container);
        padding: 24px;
        border-radius: var(--md-sys-shape-corner-large);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
    }

    .timestamp-label {
        font-size: 16px;
        font-weight: 500;
        color: var(--md-sys-color-primary);
        background-color: var(--md-sys-color-primary-container);
        padding: 8px 16px;
        border-radius: var(--md-sys-shape-corner-full);
    }

    .slider-wrapper {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 16px;
    }

    input[type=range] {
        flex: 1;
        accent-color: var(--md-sys-color-primary);
        cursor: pointer;
    }

    .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--md-sys-color-on-surface-variant);
    }
</style>

{% if timestamps|length > 0 %}
<div class="timeline-container">
    <div class="viewer-card">
        <img id="timestampImage" src="/static/{{ timestamps[0].filename }}" alt="Snapshot" class="viewer-image">
    </div>

    <div class="control-panel">
        <div class="timestamp-label" id="sliderValue">
            {{ timestamps[0].timestamp | timestamp_to_human_readable }}
        </div>
        <div class="slider-wrapper">
            <span class="material-symbols-rounded">history</span>
            <input type="range" id="discreteSlider" min="0" max="{{timestamps|length - 1}}" step="1" value="0">
            <span class="material-symbols-rounded">schedule</span>
        </div>
    </div>
</div>

<script>
    const data = {{ timestamps|tojson }};
    const slider = document.getElementById('discreteSlider');
    const sliderValue = document.getElementById('sliderValue');
    const timestampImage = document.getElementById('timestampImage');

    slider.addEventListener('input', function() {
        const index = parseInt(slider.value);
        const item = data[index];

        const date = new Date(item.timestamp * 1000);
        sliderValue.textContent = date.toLocaleString();
        timestampImage.src = `/static/${item.filename}`;
    });
</script>
{% else %}
<div class="empty-state">
    <span class="material-symbols-rounded" style="font-size: 64px;">event_busy</span>
    <p>No moments recorded yet. Wait a few seconds...</p>
</div>
{% endif %}
{% endblock %}
