<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timeseek Export - {{ entry.timestamp | timestamp_to_human_readable }}</title>
    <style>
        body { font-family: sans-serif; padding: 40px; color: #333; }
        .header { border-bottom: 2px solid #6750A4; padding-bottom: 10px; margin-bottom: 20px; }
        .meta { font-size: 14px; color: #666; margin-bottom: 20px; }
        img { max-width: 100%; border: 1px solid #ddd; border-radius: 8px; }
        .section { margin-top: 30px; }
        .section-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #6750A4; }
        .content { background: #f9f9f9; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-size: 14px; }
        @media print {
            .no-print { display: none; }
        }
    </style>
</head>
<body>
    <div class="no-print" style="margin-bottom: 20px;">
        <button onclick="window.print()" style="padding: 10px 20px; cursor: pointer; background: #6750A4; color: white; border: none; border-radius: 20px;">Print / Save as PDF</button>
        <button onclick="window.history.back()" style="padding: 10px 20px; cursor: pointer; background: #eee; border: none; border-radius: 20px;">Back</button>
    </div>

    <div class="header">
        <h1>{{ entry.app }}</h1>
        <div class="meta">
            <strong>Title:</strong> {{ entry.title }}<br>
            <strong>Captured:</strong> {{ entry.timestamp | timestamp_to_human_readable }}
        </div>
    </div>

    <img src="/static/{{ entry.filename }}" alt="Snapshot">

    {% if entry.notes %}
    <div class="section">
        <div class="section-title">Notes</div>
        <div class="content">{{ entry.notes }}</div>
    </div>
    {% endif %}

    {% if entry.text %}
    <div class="section">
        <div class="section-title">OCR Text</div>
        <div class="content">{{ entry.text }}</div>
    </div>
    {% endif %}

    <div style="margin-top: 50px; font-size: 10px; color: #999; text-align: center;">
        Generated by Timeseek - Your Personal Digital Memory
    </div>
</body>
</html>
